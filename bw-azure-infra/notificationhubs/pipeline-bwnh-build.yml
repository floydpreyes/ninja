name: BW-Bicep-NotificationHubs-Build-$(Date:yyyyMMdd).$(Rev:r)

resources:
  repositories:
    - repository: templates
      type: git
      name: ais/ci-cd-patterns
      ref: refs/tags/2.2.0

trigger:
  batch: true
  branches:
    include:
      - main
      - release/*
      - hotfix/*
  paths:
    include:
      - notificationhubs/*
    exclude:
      - .gitignore
      - .gitattributes
      - .git/*
      - .vscode/*
      - pipeline-*.yml
      - '*.md'

pool:
  vmImage: 'ubuntu-latest'

extends:
  template: azure-resources-bicep/az-build.yml@templates
  parameters:
    bicepFile: 'notificationhubs/infra-nh.bicep'
    bicepParamsFolder: 'notificationhubs/parameters'
    workingDirectory: "$(System.DefaultWorkingDirectory)"
    artifactsFeed: 'BW/bw-build'
    artifactsDescription: 'WTP Birdwatching - Notification Hubs Bicep Build'
    artifactNamePrefix: 'azinfra-nh'
    buildMajorNumber: '1'
    buildMinorNumber: '0'
    psRulesCustomFile: ''

    resourceGroupName:
      - name: 'rg-devtest-ase-bw'
        bicepParams: 'dev-nh'
        location: 'australiasoutheast'
        serviceConnection: 'azure.devtest-BW'
      - name: 'rg-uat-ase-bw'
        bicepParams: 'uat-nh'
        location: 'australiasoutheast'
        serviceConnection: 'azure.uat-BW'
      - name: 'rg-prd-ase-bw'
        bicepParams: 'prd-nh'
        location: 'australiasoutheast'
        serviceConnection: 'azure.prd-BW'
